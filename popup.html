<!DOCTYPE html>
<html lang="zh-Hans">
<head>
    <meta charset="UTF-8">
    <title>YouTube Exact Date Settings</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="icon48.png" alt="icon" width="24" height="24">
            <h2>设置 (Settings)</h2>
        </div>
        
        <div class="form-group">
            <label for="dateFormat">日期格式 (Date Format)</label>
            <select id="dateFormat">
                <option value="YYYY-MM-DD">2024-03-14</option>
                <option value="YYYY/MM/DD">2024/03/14</option>
                <option value="YYYY年MM月DD日">2024年03月14日</option>
            </select>
        </div>

        <div class="form-group checkbox-group">
            <input type="checkbox" id="showTime">
            <label for="showTime">显示时分秒 (Show HH:mm:ss)</label>
        </div>

        <button id="saveBtn">保存(SAVE)</button>
        <div id="status" class="status"></div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
